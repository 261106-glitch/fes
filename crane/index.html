<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>🏗️ クレーンゲーム</title>
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="crane.css">
</head>
<body>
  <!-- Animated Background -->
  <div class="bg-animated">
    <div class="bg-orb"></div>
    <div class="bg-orb"></div>
    <div class="bg-orb"></div>
  </div>

  <div class="page-container">
    <!-- Header -->
    <div class="game-header">
      <a href="../index.html" class="back-btn" onclick="event.preventDefault(); navigateTo('../index.html');">←</a>
      <div class="game-title">🏗️ クレーンゲーム</div>
      <div class="attempt-counter" id="attemptCounter">残り: <span id="attemptsLeft">3</span>回</div>
    </div>

    <!-- Crane Machine -->
    <div class="crane-machine" id="craneMachine">
      <!-- Machine top frame -->
      <div class="machine-top-frame">
        <div class="machine-light machine-light--1"></div>
        <div class="machine-light machine-light--2"></div>
        <div class="machine-light machine-light--3"></div>
      </div>

      <!-- Rail area -->
      <div class="crane-rail" id="craneRail">
        <div class="rail-track"></div>
        <div class="crane-assembly" id="craneAssembly">
          <div class="crane-trolley"></div>
          <div class="crane-wire" id="craneWire"></div>
          <div class="crane-claw-container" id="craneClawContainer">
            <div class="crane-claw" id="craneClaw">
              <div class="claw-arm claw-arm--left"></div>
              <div class="claw-arm claw-arm--right"></div>
              <div class="claw-center"></div>
            </div>
          </div>
        </div>
      </div>

      <!-- Play area -->
      <div class="play-area" id="playArea">
        <!-- Prizes are generated by JS -->
      </div>

      <!-- Prize chute -->
      <div class="prize-chute" id="prizeChute">
        <div class="prize-chute-opening"></div>
        <div class="prize-chute-label">▼ PRIZE</div>
      </div>

      <!-- Glass reflection overlay -->
      <div class="glass-reflection"></div>
    </div>

    <!-- Collected prizes display -->
    <div class="collected-area glass-card mt-md" id="collectedArea">
      <div class="collected-label">🎁 ゲットした景品</div>
      <div class="collected-prizes" id="collectedPrizes">
        <span class="collected-empty">まだ景品がありません</span>
      </div>
    </div>

    <!-- Grab Button -->
    <div class="grab-btn-wrapper mt-md">
      <button class="grab-btn" id="grabBtn" type="button">
        <span class="grab-btn-text">つかむ！</span>
        <span class="grab-btn-icon">🪝</span>
      </button>
    </div>
  </div>

  <!-- Instructions Overlay -->
  <div class="modal-overlay" id="instructionsOverlay">
    <div class="modal-content">
      <span class="modal-icon">🏗️</span>
      <h2 class="modal-title">クレーンゲーム</h2>
      <p class="modal-subtitle">
        クレーンが左右に動いています。<br>
        タイミングよく<strong>「つかむ！」</strong>ボタンを<br>
        押して景品をゲットしよう！<br><br>
        <span style="color: var(--neon-yellow);">🎯 チャンスは3回！</span><br>
        <span style="color: var(--neon-green);">🎁 1つ以上ゲットでクリア！</span>
      </p>
      <div class="modal-actions">
        <button class="btn btn--primary btn--large btn--full" id="startBtn">ゲームスタート！</button>
      </div>
    </div>
  </div>

  <!-- Result Overlay -->
  <div class="modal-overlay hidden" id="resultOverlay">
    <div class="modal-content">
      <span class="modal-icon" id="resultIcon">🎉</span>
      <h2 class="modal-title" id="resultTitle">クリア！</h2>
      <p class="modal-subtitle" id="resultMessage">景品をゲットしました！</p>
      <div class="collected-prizes result-prizes" id="resultPrizes"></div>
      <div class="modal-actions mt-lg">
        <button class="btn btn--primary btn--full" id="resultBackBtn">スタンプラリーに戻る</button>
        <button class="btn btn--outline btn--full" id="retryBtn">もう一度遊ぶ</button>
      </div>
    </div>
  </div>

  <script src="../js/stamp-manager.js"></script>
  <script src="../js/common.js"></script>
  <script src="crane.js"></script>
</body>
</html>
